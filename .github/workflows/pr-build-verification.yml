# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# Verify the Stolostron release build succeeds on every PR.
# Runs the same build as create-release-stolostron.yml but skips artifact upload.
# Purpose: catch build breakage early, before a release is attempted.

name: PR build verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - backplane-2.17
      - backplane-2.11

permissions: {}

concurrency:
  group: pr-build-verification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # pinned to 4.1.7
        with:
          fetch-depth: 0 # required to access tags
          submodules: "true"

      - name: Build & run devcontainer image
        # mirrors the same step in create-release-stolostron.yml
        id: devcontainer
        run: |
          docker build --tag devcontainer:latest .devcontainer
          mkdir -p $HOME/.docker # in case it doesn't exist
          container_id=$(docker create -w /workspace -v $GITHUB_WORKSPACE:/workspace -v /var/run/docker.sock:/var/run/docker.sock devcontainer:latest)
          docker start "$container_id"
          echo "container_id=$container_id" >> $GITHUB_ENV

      - name: Build required release files
        run: |
          container_id=${{env.container_id}}
          docker exec "$container_id" task make-release-artifacts