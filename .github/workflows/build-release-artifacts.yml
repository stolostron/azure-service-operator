# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# Reusable workflow: build the Stolostron release artifacts.
# Called by create-release-stolostron.yml (upload: true) and
# pr-build-verification.yml (upload: false).

name: Build release artifacts

on:
  workflow_call:
    inputs:
      upload:
        description: "Upload built artifacts as a GitHub release"
        type: boolean
        default: false
      tag:
        description: "Git tag to attach the release to (required when upload is true)"
        type: string
        default: ""

permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        if: inputs.upload && inputs.tag == ''
        run: |
          echo "::error::The 'tag' input is required when 'upload' is true."
          exit 1

      - name: Checkout code
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # pinned to 4.1.7
        with:
          fetch-depth: 0 # required to access tags
          submodules: "true"
          persist-credentials: false

      - name: Build & run devcontainer image
        # NB: if you update this also update live-validation.yml, pre-release-tests.yaml and create-release-experimental.yml
        id: devcontainer
        run: |
          docker build --tag devcontainer:latest .devcontainer
          mkdir -p $HOME/.docker # in case it doesn't exist
          container_id=$(docker create -w /workspace -v $GITHUB_WORKSPACE:/workspace -v /var/run/docker.sock:/var/run/docker.sock devcontainer:latest)
          docker start "$container_id"
          echo "container_id=$container_id" >> $GITHUB_ENV

      - name: Build required release files
        run: |
          container_id=${{env.container_id}}
          docker exec "$container_id" task make-release-artifacts

      - name: Upload release assets
        if: inputs.upload
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # this is v2.9.0, but pinned
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag }}
          file: "v2/out/release/*"
          file_glob: true
